<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  
  <!-- PWA Meta Tags -->
  <meta name="application-name" content="PEGGASUSD" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="PEGGASUSD" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#0a0a0f" />
  <meta name="msapplication-TileColor" content="#0a0a0f" />
  <meta name="msapplication-tap-highlight" content="no" />
  
  <!-- Description -->
  <meta name="description" content="Lightning wallet con saldo en SAT y USD" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="PEGGASUSD" />
  <meta property="og:description" content="Lightning wallet con saldo en SAT y USD" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="PEGGASUSD" />
  <meta name="twitter:description" content="Lightning wallet con saldo en SAT y USD" />
  
  <!-- Icons -->
  <link rel="icon" type="image/png" href="/assets/PEGGASUSD_Logo.png" />
  <link rel="apple-touch-icon" href="/assets/PEGGASUSD_Logo.png" />
  <link rel="mask-icon" href="/assets/PEGGASUSD_Logo.png" color="#07090D" />
  
  <!-- Manifest -->
  <link rel="manifest" href="/manifest.json" />

  <title>PEGGASUSD</title>

  <!-- Fonts - Space Grotesk for premium UI, JetBrains Mono for numbers -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  
  <!-- Initial loading styles -->
  <style>
    /* Prevent pull-to-refresh on iOS */
    html, body {
      overscroll-behavior-y: none;
      background: #151520;
    }

    /* Initial splash screen. Fade-out is driven by the Web Animations
       API in main.tsx's hideSplash() — not a CSS class toggle — because
       `transitionend` proved unreliable on Android WebView and left the
       splash visibly racing the biometric prompt during unlock. */
    #splash {
      position: fixed;
      inset: 0;
      background: #07090D;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    .splash-content {
      position: relative;
      width: 200px;
      height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .splash-logo {
      width: 64px;
      height: 64px;
      position: relative;
      z-index: 2;
    }

    .splash-stars {
      position: absolute;
      inset: 0;
      animation: rotate-stars 12s linear infinite;
    }

    .splash-star {
      position: absolute;
      width: 3px;
      height: 3px;
      background: #F7931A;
      border-radius: 50%;
      box-shadow: 0 0 4px #F7931A, 0 0 8px rgba(247, 147, 26, 0.4);
    }

    .splash-star:nth-child(1) { top: 0; left: 50%; transform: translateX(-50%); }
    .splash-star:nth-child(2) { top: 2%; right: 12%; }
    .splash-star:nth-child(3) { right: 0; top: 30%; }
    .splash-star:nth-child(4) { right: 2%; bottom: 25%; }
    .splash-star:nth-child(5) { bottom: 2%; right: 15%; }
    .splash-star:nth-child(6) { bottom: 0; left: 50%; transform: translateX(-50%); }
    .splash-star:nth-child(7) { bottom: 2%; left: 15%; }
    .splash-star:nth-child(8) { left: 2%; bottom: 25%; }
    .splash-star:nth-child(9) { left: 0; top: 30%; }
    .splash-star:nth-child(10) { top: 2%; left: 12%; }

    .splash-star:nth-child(1),
    .splash-star:nth-child(6) {
      background: #00C7B7;
      box-shadow: 0 0 4px #00C7B7, 0 0 8px rgba(0, 199, 183, 0.4);
    }

    .splash-star:nth-child(3),
    .splash-star:nth-child(8) {
      background: #00C7B7;
      box-shadow: 0 0 4px #00C7B7, 0 0 8px rgba(0, 199, 183, 0.4);
    }

    .splash-ring {
      position: absolute;
      inset: 20px;
      border-radius: 50%;
      border: 1px solid rgba(247, 147, 26, 0.1);
      animation: rotate-stars 8s linear infinite reverse;
    }

    .splash-ring::before {
      content: '';
      position: absolute;
      top: -2px;
      left: 50%;
      transform: translateX(-50%);
      width: 4px;
      height: 4px;
      background: #F7931A;
      border-radius: 50%;
      box-shadow: 0 0 6px #F7931A;
    }

    .splash-text {
      position: absolute;
      bottom: -40px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      background: linear-gradient(135deg, #F7931A, #00C7B7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      white-space: nowrap;
    }

    @keyframes rotate-stars {
      to { transform: rotate(360deg); }
    }
  </style>
</head>

<body>
  <!-- Splash screen shown during initial load -->
  <div id="splash">
    <div class="splash-content">
      <div class="splash-stars">
        <div class="splash-star"></div>
        <div class="splash-star"></div>
        <div class="splash-star"></div>
        <div class="splash-star"></div>
        <div class="splash-star"></div>
        <div class="splash-star"></div>
        <div class="splash-star"></div>
        <div class="splash-star"></div>
        <div class="splash-star"></div>
        <div class="splash-star"></div>
      </div>
      <div class="splash-ring"></div>
      <img class="splash-logo" src="/assets/PEGGASUSD_Logo.png" alt="PEGGASUSD" />
      <span class="splash-text">PEGGASUSD</span>
    </div>
  </div>
  
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
  
  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then((registration) => {
            console.log('SW registered:', registration.scope);
          })
          .catch((error) => {
            console.log('SW registration failed:', error);
          });
      });
    }
  </script>
</body>

</html>
